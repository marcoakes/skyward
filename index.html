<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#15102e">
<title>Skyward — A Floating Islands Adventure</title>
<style>
  :root{
    --frame:#2a2150;
    --frame2:#1a1438;
    --ui:#e9e4ff;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:#06040f;overflow:hidden;font-family:'Trebuchet MS','Segoe UI',system-ui,sans-serif;}
  #wrap{
    position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 30%, #15102e 0%, #06040f 70%);
    touch-action:none;
  }
  #stage{
    position:relative;width:100%;height:100%;max-width:100vw;max-height:100vh;
    border-radius:18px;overflow:hidden;
    box-shadow:0 0 0 6px var(--frame), 0 0 0 9px var(--frame2), 0 30px 80px rgba(0,0,0,.7);
  }
  canvas{display:block;width:100%;height:100%;image-rendering:auto;}
  /* CRT scanlines + vignette */
  #crt{
    position:absolute;inset:0;pointer-events:none;z-index:5;
    background:
      repeating-linear-gradient(rgba(0,0,0,0) 0 2px, rgba(0,0,0,.06) 2px 3px);
    mix-blend-mode:multiply;
  }
  #vig{
    position:absolute;inset:0;pointer-events:none;z-index:6;
    background:radial-gradient(120% 120% at 50% 45%, transparent 60%, rgba(8,4,16,.5) 100%);
  }

  /* Top-right control buttons (music / pause) */
  #topbtns{position:absolute;top:14px;right:14px;display:flex;gap:10px;z-index:8;}
  .tbtn{
    width:54px;height:54px;border-radius:14px;border:none;cursor:pointer;
    background:linear-gradient(180deg,#3a2f6e,#241b48);
    box-shadow:0 4px 0 #160f33, inset 0 1px 0 rgba(255,255,255,.15);
    color:#f4f1ff;font-size:24px;font-weight:bold;display:flex;align-items:center;justify-content:center;
    transition:transform .06s;
  }
  .tbtn:active{transform:translateY(3px);box-shadow:0 1px 0 #160f33;}

  /* Touch controls */
  #touch{position:absolute;inset:0;z-index:7;pointer-events:none;}
  .pad{position:absolute;bottom:max(22px,env(safe-area-inset-bottom));pointer-events:auto;user-select:none;}
  #dpad{left:max(20px,env(safe-area-inset-left));display:flex;gap:14px;}
  #abtns{right:max(20px,env(safe-area-inset-right));display:flex;gap:14px;align-items:flex-end;}
  .ctrl{
    width:78px;height:78px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, rgba(255,255,255,.35), rgba(70,55,130,.55));
    border:2px solid rgba(255,255,255,.4);
    box-shadow:0 6px 18px rgba(0,0,0,.45), inset 0 -6px 12px rgba(0,0,0,.25);
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:30px;font-weight:900;
    -webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px);transition:transform .05s,filter .05s;
  }
  .ctrl:active{transform:scale(.92);filter:brightness(1.3);}
  #jump{width:98px;height:98px;background:radial-gradient(circle at 35% 30%, rgba(180,255,200,.55), rgba(40,150,90,.6));}
  .hidden{display:none!important;}

  /* Overlay screens */
  .screen{
    position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;color:#fff;
    background:linear-gradient(180deg, rgba(10,8,28,.72), rgba(10,8,28,.9));
    padding:24px;
  }
  .title{
    font-size:clamp(38px,9vw,86px);font-weight:900;letter-spacing:2px;line-height:.95;
    background:linear-gradient(180deg,#fff4cf,#ffd166 45%,#f4a23a);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 4px 0 rgba(0,0,0,.25);margin-bottom:6px;
  }
  .sub{color:#bfb6e8;font-size:clamp(14px,3.4vw,20px);margin-bottom:26px;max-width:640px;}
  .play{
    font-size:clamp(20px,5vw,28px);font-weight:800;color:#1a1438;
    background:linear-gradient(180deg,#aef0c0,#5fd089);
    border:none;border-radius:16px;padding:16px 42px;cursor:pointer;
    box-shadow:0 6px 0 #2f8a55, 0 12px 24px rgba(0,0,0,.4);
  }
  .play:active{transform:translateY(4px);box-shadow:0 2px 0 #2f8a55;}
  .keys{margin-top:22px;color:#8d83bd;font-size:13px;line-height:1.7;}
  .badge{display:inline-block;background:#2a2150;border-radius:6px;padding:2px 8px;margin:0 3px;color:#e9e4ff;font-weight:bold;}
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="game"></canvas>
    <div id="crt"></div>
    <div id="vig"></div>

    <div id="topbtns">
      <button class="tbtn" id="btnMusic" title="Music">&#9834;</button>
      <button class="tbtn" id="btnPause" title="Pause">&#10073;&#10073;</button>
    </div>

    <div id="touch" class="hidden">
      <div class="pad" id="dpad">
        <div class="ctrl" data-k="left">&#9664;</div>
        <div class="ctrl" data-k="right">&#9654;</div>
      </div>
      <div class="pad" id="abtns">
        <div class="ctrl" id="jump" data-k="jump">&#9650;</div>
      </div>
    </div>

    <div class="screen" id="startScreen">
      <div class="title">SKYWARD</div>
      <div class="sub">A floating-islands adventure. Run, leap between sky platforms, bop the snails, grab the coins and reach the golden flag.</div>
      <button class="play" id="startBtn">&#9658; PLAY</button>
      <div class="keys">
        <span class="badge">&larr;</span><span class="badge">&rarr;</span> move &nbsp;·&nbsp;
        <span class="badge">Space</span>/<span class="badge">&uarr;</span> jump &nbsp;·&nbsp;
        <span class="badge">P</span> pause<br>
        On phone &amp; iPad: use the on-screen buttons.
      </div>
    </div>

    <div class="screen hidden" id="endScreen">
      <div class="title" id="endTitle">YOU WIN!</div>
      <div class="sub" id="endSub"></div>
      <button class="play" id="againBtn">&#8635; PLAY AGAIN</button>
    </div>
  </div>
</div>

<script>
"use strict";
//==================================================================
// SKYWARD — a classic-style platformer with procedural art.
// Single file. Works in any modern browser + iOS Safari (touch).
//==================================================================

const TILE = 48;               // logical tile size (px)
const GRAV = 2400;             // gravity px/s^2
const MOVE = 560;              // run speed px/s
const ACCEL = 4200;            // ground accel
const AIR_ACCEL = 2600;
const FRICTION = 3400;
const JUMP_V = 920;            // jump velocity
const MAX_FALL = 1500;
const COYOTE = 0.10;           // coyote time (s)
const JUMP_BUFFER = 0.12;

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let VIEW_W = 960, VIEW_H = 540; // logical render resolution (letterboxed)
let scale = 1, offX = 0, offY = 0, dpr = 1;

function resize(){
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = window.innerWidth, h = window.innerHeight;
  const targetAspect = 16/9;
  let aspect = w/h;
  if (aspect > targetAspect){ VIEW_H = 540; VIEW_W = Math.round(540*aspect); }
  else { VIEW_W = 960; VIEW_H = Math.round(960/aspect); }
  canvas.width = Math.round(VIEW_W*dpr);
  canvas.height = Math.round(VIEW_H*dpr);
  canvas.style.width = w+'px';
  canvas.style.height = h+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.imageSmoothingEnabled = true;
  buildSky();          // sky gradient depends on VIEW_H
  sizePostBuffers();   // bloom buffers depend on view size
}
window.addEventListener('resize', resize);

//------------------------------------------------------------------
// Seeded PRNG for reproducible scenery
//------------------------------------------------------------------
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

//------------------------------------------------------------------
// INPUT
//------------------------------------------------------------------
const keys = { left:false, right:false, jump:false, jumpPressed:false };

const KEYMAP = {
  ArrowLeft:'left', KeyA:'left',
  ArrowRight:'right', KeyD:'right',
  Space:'jump', ArrowUp:'jump', KeyW:'jump', KeyZ:'jump'
};
addEventListener('keydown', e=>{
  const k = KEYMAP[e.code];
  if(k){ keys[k]=true; if(k==='jump') keys.jumpPressed=true; e.preventDefault(); }
  if(e.code==='KeyP') togglePause();
});
addEventListener('keyup', e=>{ const k=KEYMAP[e.code]; if(k){keys[k]=false; e.preventDefault();} });

const touchLayer = document.getElementById('touch');
function isTouch(){ return ('ontouchstart' in window) || navigator.maxTouchPoints>0; }
if(isTouch()) touchLayer.classList.remove('hidden');

document.querySelectorAll('.ctrl').forEach(el=>{
  const k = el.dataset.k;
  const on = e=>{ e.preventDefault(); keys[k]=true; if(k==='jump'){keys.jumpPressed=true;} };
  const off = e=>{ e.preventDefault(); keys[k]=false; };
  el.addEventListener('touchstart', on, {passive:false});
  el.addEventListener('touchend', off, {passive:false});
  el.addEventListener('touchcancel', off, {passive:false});
  el.addEventListener('mousedown', on);
  addEventListener('mouseup', off);
});

//------------------------------------------------------------------
// AUDIO — tiny WebAudio chiptune + SFX
//------------------------------------------------------------------
let audioCtx=null, musicOn=true, masterGain=null, musicGain=null, musicTimer=null;
function initAudio(){
  if(audioCtx) return;
  const AC = window.AudioContext || window.webkitAudioContext;
  if(!AC) return;
  audioCtx = new AC();
  masterGain = audioCtx.createGain(); masterGain.gain.value=0.5; masterGain.connect(audioCtx.destination);
  musicGain = audioCtx.createGain(); musicGain.gain.value=0.18; musicGain.connect(masterGain);
}
function beep(freq, dur, type='square', gain=0.25, target=masterGain){
  if(!audioCtx) return;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(gain, audioCtx.currentTime+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+dur);
  o.connect(g); g.connect(target); o.start(); o.stop(audioCtx.currentTime+dur+0.02);
}
const sfx = {
  jump:()=>beep(520,0.16,'square',0.22),
  coin:()=>{beep(1180,0.07,'square',0.2);setTimeout(()=>beep(1560,0.12,'square',0.2),60);},
  stomp:()=>beep(220,0.12,'square',0.3),
  hurt:()=>{beep(300,0.2,'sawtooth',0.3);setTimeout(()=>beep(180,0.3,'sawtooth',0.3),100);},
  win:()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.25,'square',0.25),i*140));}
};
const MELODY = [
  [659,0.22],[659,0.22],[0,0.22],[659,0.22],[0,0.22],[523,0.22],[659,0.22],[0,0.22],
  [784,0.44],[0,0.44],[392,0.44],[0,0.44],
  [523,0.33],[0,0.16],[392,0.33],[0,0.16],[330,0.33],[0,0.16],
  [440,0.22],[0,0.11],[494,0.22],[466,0.22],[440,0.33],
  [392,0.22],[659,0.22],[784,0.22],[880,0.33],[698,0.22],[784,0.22],[0,0.22],[659,0.22],[523,0.22],[587,0.22],[494,0.44]
];
let melodyIdx=0;
function scheduleMusic(){
  if(!audioCtx||!musicOn) return;
  const [f,d]=MELODY[melodyIdx];
  if(f>0){
    beep(f,d*0.9,'triangle',0.4,musicGain);
    if(melodyIdx%2===0) beep(f/2,d*0.9,'square',0.12,musicGain);
  }
  melodyIdx=(melodyIdx+1)%MELODY.length;
  musicTimer=setTimeout(scheduleMusic, d*1000*0.55);
}
function startMusic(){ if(audioCtx&&musicOn&&!musicTimer) scheduleMusic(); }
function stopMusic(){ if(musicTimer){clearTimeout(musicTimer); musicTimer=null;} }

document.getElementById('btnMusic').addEventListener('click', ()=>{
  initAudio(); musicOn=!musicOn;
  document.getElementById('btnMusic').style.opacity = musicOn? '1':'0.4';
  if(musicOn) startMusic(); else stopMusic();
});

//==================================================================
// PRERENDERED ART  (offscreen canvases, drawn once)
//==================================================================
function makeCanvas(w,h){ const c=document.createElement('canvas'); c.width=w; c.height=h; return c; }
function rr(g,x,y,w,h,r){ g.beginPath();
  g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r);
  g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); }

// ---------- HERO (green-hooded adventurer, smooth shaded) ----------
const HERO_W=48, HERO_H=58;
function drawHero(c, pose){
  const g=c.getContext('2d'); g.clearRect(0,0,HERO_W,HERO_H);
  g.imageSmoothingEnabled=true;
  const cx=HERO_W/2;
  // pose params
  let lF=0,lB=0,lean=0,cape=0,armF=0,armB=0,bob=0;
  if(pose==='run1'){lF=7;lB=-6;lean=2;cape=10;armF=-5;armB=6;}
  else if(pose==='run2'){lF=-6;lB=7;lean=2;cape=6;armF=6;armB=-5;}
  else if(pose==='jump'){lF=-7;lB=4;lean=3;cape=16;armF=-7;armB=-3;}
  else {bob=1;}
  const ox=lean;

  // ---- cloak / cape behind ----
  let cg=g.createLinearGradient(cx-14,18,cx+6,52);
  cg.addColorStop(0,'#2f9e54'); cg.addColorStop(1,'#155c31');
  g.fillStyle=cg;
  g.beginPath();
  g.moveTo(cx-6+ox,18);
  g.quadraticCurveTo(cx-20-cape,30, cx-14-cape*0.6,52+bob);
  g.lineTo(cx-2-cape*0.3,52+bob);
  g.quadraticCurveTo(cx-2,34, cx+6+ox,20);
  g.closePath(); g.fill();
  g.fillStyle='rgba(0,0,0,.18)';
  g.beginPath();g.moveTo(cx-6+ox,18);g.quadraticCurveTo(cx-10-cape*0.5,32,cx-7-cape*0.4,50+bob);g.lineTo(cx-2-cape*0.2,50+bob);g.quadraticCurveTo(cx-1,34,cx+4+ox,22);g.closePath();g.fill();

  // ---- legs + boots ----
  g.fillStyle='#3b4a6b';
  rr(g,cx-9+ox,38,7,11+lB,3); g.fill();   // back leg
  rr(g,cx+1+ox,38,7,11+lF,3); g.fill();   // front leg
  g.fillStyle='#4a3018';
  rr(g,cx-11+ox,46+lB,11,7,3); g.fill();  // back boot
  rr(g,cx-1+ox,46+lF,11,7,3); g.fill();   // front boot
  g.fillStyle='rgba(255,255,255,.12)';
  g.fillRect(cx-1+ox,46+lF,11,2);

  // ---- torso / tunic ----
  let tg=g.createLinearGradient(cx-10,22,cx+12,42);
  tg.addColorStop(0,'#e6bf63'); tg.addColorStop(1,'#a87f33');
  g.fillStyle=tg; rr(g,cx-10+ox,21-bob,20,21,6); g.fill();
  g.fillStyle='#5e3f20'; g.fillRect(cx-10+ox,33-bob,20,4);     // belt
  g.fillStyle='#f1d65a'; rr(g,cx-2+ox,33-bob,5,4,1); g.fill(); // buckle
  g.fillStyle='rgba(255,255,255,.18)'; rr(g,cx-8+ox,23-bob,5,12,3); g.fill();

  // ---- backpack peeking on the back ----
  g.fillStyle='#8a5a30'; rr(g,cx-13+ox,24,5,14,2); g.fill();
  g.fillStyle='#6e451f'; g.fillRect(cx-13+ox,28,5,3);

  // ---- arms ----
  let ag=g.createLinearGradient(0,24,0,38); ag.addColorStop(0,'#2f9e54'); ag.addColorStop(1,'#1c6b3a');
  g.fillStyle=ag;
  rr(g,cx-12+ox,24+armB,5,12,2.5); g.fill();   // back arm
  rr(g,cx+7+ox,24+armF,5,12,2.5); g.fill();    // front arm
  g.fillStyle='#f6cda0';
  rr(g,cx+7+ox,33+armF,5,5,2); g.fill();        // front hand

  // ---- head ----
  let hg=g.createRadialGradient(cx-1+ox,13-bob,2,cx+1+ox,15-bob,11);
  hg.addColorStop(0,'#fbd9ad'); hg.addColorStop(1,'#e0a877');
  g.fillStyle=hg; g.beginPath(); g.arc(cx+ox,14-bob,8.5,0,7); g.fill();

  // ---- hood ----
  let hoodg=g.createLinearGradient(cx-10,2,cx+10,18);
  hoodg.addColorStop(0,'#54d07f'); hoodg.addColorStop(0.5,'#2f9e54'); hoodg.addColorStop(1,'#1c6b3a');
  g.fillStyle=hoodg;
  g.beginPath();
  g.moveTo(cx-9+ox,16-bob);
  g.quadraticCurveTo(cx-11+ox,2-bob, cx+ox,1-bob);
  g.quadraticCurveTo(cx+11+ox,2-bob, cx+10+ox,12-bob);   // hood crown
  g.quadraticCurveTo(cx+18+ox+cape*0.3,10-bob, cx+20+ox+cape*0.3,4-bob); // pointed tip trailing
  g.quadraticCurveTo(cx+12+ox,12-bob, cx+9+ox,17-bob);
  g.lineTo(cx-9+ox,16-bob); g.closePath(); g.fill();
  // hood inner shadow (frames the face)
  g.fillStyle='rgba(0,0,0,.32)';
  g.beginPath(); g.ellipse(cx+1+ox,13-bob,6.5,7,0,0,7); g.fill();
  // hood front rim highlight
  g.strokeStyle='rgba(180,255,200,.5)'; g.lineWidth=1.4;
  g.beginPath(); g.arc(cx+ox,11-bob,9,Math.PI*0.95,Math.PI*1.65); g.stroke();

  // ---- glowing eyes ----
  g.fillStyle='#dff6ff';
  g.beginPath(); g.arc(cx-1+ox,13-bob,1.7,0,7); g.fill();
  g.beginPath(); g.arc(cx+4+ox,13-bob,1.7,0,7); g.fill();
  g.fillStyle='rgba(150,220,255,.7)';
  g.beginPath(); g.arc(cx-1+ox,13-bob,3,0,7); g.fill();
  g.beginPath(); g.arc(cx+4+ox,13-bob,3,0,7); g.fill();
}
const heroFrames={};
['idle','run1','run2','jump'].forEach(p=>{const c=makeCanvas(HERO_W,HERO_H);drawHero(c,p);heroFrames[p]=c;});

// ---------- SNAIL enemy (shaded) ----------
const SNAIL_W=48, SNAIL_H=40;
function drawSnail(flip){
  const c=makeCanvas(SNAIL_W,SNAIL_H); const g=c.getContext('2d'); g.imageSmoothingEnabled=true;
  if(flip){g.translate(SNAIL_W,0);g.scale(-1,1);}
  // foot/body
  let bg=g.createLinearGradient(0,24,0,38); bg.addColorStop(0,'#8fce72'); bg.addColorStop(1,'#5e964a');
  g.fillStyle=bg;
  g.beginPath();
  g.moveTo(3,34); g.quadraticCurveTo(2,26,10,25); g.lineTo(38,25);
  g.quadraticCurveTo(44,25,42,34); g.quadraticCurveTo(22,38,3,34); g.closePath(); g.fill();
  // head
  g.fillStyle='#7fc163';
  g.beginPath(); g.ellipse(9,22,7,8,0,0,7); g.fill();
  // eyestalks
  g.strokeStyle='#7fc163'; g.lineWidth=3; g.lineCap='round';
  g.beginPath(); g.moveTo(7,18); g.lineTo(5,8); g.moveTo(12,18); g.lineTo(13,6); g.stroke();
  g.fillStyle='#2b2b2b'; g.beginPath(); g.arc(5,7,2.4,0,7); g.arc(13,5,2.4,0,7); g.fill();
  g.fillStyle='#fff'; g.beginPath(); g.arc(4.3,6.3,0.9,0,7); g.arc(12.3,4.3,0.9,0,7); g.fill();
  // shell
  let sg=g.createRadialGradient(27,13,2,28,16,16);
  sg.addColorStop(0,'#7fc4f0'); sg.addColorStop(0.6,'#3a8fd0'); sg.addColorStop(1,'#1e5690');
  g.fillStyle=sg; g.beginPath(); g.arc(28,16,14,0,7); g.fill();
  // shell spiral
  g.strokeStyle='rgba(255,255,255,.5)'; g.lineWidth=2.4;
  g.beginPath(); g.arc(28,16,9,0,5.2); g.stroke();
  g.beginPath(); g.arc(29,15,4.5,0,5.5); g.stroke();
  g.strokeStyle='rgba(20,60,110,.6)'; g.lineWidth=1.6;
  g.beginPath(); g.arc(28,16,13,0,7); g.stroke();
  // glossy highlight
  g.fillStyle='rgba(255,255,255,.55)'; g.beginPath(); g.ellipse(23,10,4,2.4,-0.6,0,7); g.fill();
  return c;
}
const snailR=drawSnail(false), snailL=drawSnail(true);

//==================================================================
// SKY + PARALLAX
//==================================================================
let skyGrad=null;
function buildSky(){
  skyGrad=ctx.createLinearGradient(0,0,0,VIEW_H);
  skyGrad.addColorStop(0.00,'#243a78');
  skyGrad.addColorStop(0.20,'#4a6db0');
  skyGrad.addColorStop(0.46,'#86b2dc');
  skyGrad.addColorStop(0.68,'#d6e6ee');
  skyGrad.addColorStop(0.85,'#ffe3b4');
  skyGrad.addColorStop(1.00,'#ffc98c');
}

const BG_W=1280;
// sun + volumetric rays sprite
const sunSprite=(function(){
  const S=560, c=makeCanvas(S,S), g=c.getContext('2d');
  const r=g.createRadialGradient(S/2,S/2,8,S/2,S/2,S/2);
  r.addColorStop(0,'rgba(255,252,230,1)');
  r.addColorStop(0.12,'rgba(255,244,200,0.95)');
  r.addColorStop(0.3,'rgba(255,231,160,0.45)');
  r.addColorStop(1,'rgba(255,231,160,0)');
  g.fillStyle=r; g.fillRect(0,0,S,S);
  // rays
  g.translate(S/2,S/2);

function makeRidge(seed, baseY, amp, top, bot, snow){
  const c=makeCanvas(BG_W,540); const g=c.getContext('2d'); const rnd=mulberry32(seed);
  const grad=g.createLinearGradient(0,baseY-amp,0,540);
  grad.addColorStop(0,top); grad.addColorStop(1,bot);
  g.fillStyle=grad; g.beginPath(); g.moveTo(0,540);
  const peaks=[]; let x=-40;
  while(x<BG_W+80){
    const w=150+rnd()*200, h=amp*(0.55+rnd()*0.55);
    g.lineTo(x, baseY-h*0.18);
    g.lineTo(x+w/2, baseY-h);
    g.lineTo(x+w, baseY);
    peaks.push([x+w/2, baseY-h]);
    x+=w*0.66;
  }
  g.lineTo(BG_W,540); g.closePath(); g.fill();
  if(snow){
    for(const [cx,cy] of peaks){
      g.fillStyle='rgba(255,255,255,.85)';
      g.beginPath(); g.moveTo(cx-22,cy+40); g.lineTo(cx,cy);
      g.lineTo(cx+22,cy+40); g.lineTo(cx+9,cy+34); g.lineTo(cx,cy+22); g.lineTo(cx-9,cy+34);
      g.closePath(); g.fill();
      g.fillStyle='rgba(190,215,245,.6)';
      g.beginPath(); g.moveTo(cx,cy); g.lineTo(cx+22,cy+40); g.lineTo(cx+9,cy+34); g.lineTo(cx,cy+22); g.closePath(); g.fill();
    }
  }
  // base haze
  const hz=g.createLinearGradient(0,baseY-10,0,baseY+70);
  hz.addColorStop(0,'rgba(220,235,250,0)'); hz.addColorStop(1,'rgba(220,235,250,.5)');
  g.fillStyle=hz; g.fillRect(0,baseY-10,BG_W,90);
  return c;
}

  for(let i=0;i<3;i++){
    const sx=6+rnd()*(TILE-14), sy=y0+16+rnd()*(TILE-22), sr=3+rnd()*3.5;

  }

  if(left){ const lg=g.createLinearGradient(0,0,6,0); lg.addColorStop(0,'rgba(0,0,0,.3)'); lg.addColorStop(1,'rgba(0,0,0,0)'); g.fillStyle=lg; g.fillRect(0,y0,6,TILE); }

  // top inner shadow when covered (blends stacked dirt)

  return c;

function grassCap(g,y0){
  const grg=g.createLinearGradient(0,y0-8,0,y0+14); grg.addColorStop(0,'#86ec64'); grg.addColorStop(1,'#3f9b3f');
  g.fillStyle=grg; g.beginPath(); g.moveTo(0,y0+12);
  const bumps=6, bw2=TILE/bumps;
  for(let i=0;i<=bumps;i++){ g.lineTo(i*bw2, y0+12+(i%2?5:0)); }
  g.lineTo(TILE,y0-2); g.lineTo(0,y0-2); g.closePath(); g.fill();
  g.fillStyle='rgba(0,0,0,.18)'; g.fillRect(0,y0+11,TILE,3);
  g.fillStyle='rgba(225,255,205,.65)'; g.fillRect(0,y0-2,TILE,2);
  g.strokeStyle='#6cd24c'; g.lineWidth=2; g.lineCap='round';
  const r2=mulberry32(77); for(let i=0;i<TILE;i+=5){ const h=4+r2()*6; g.beginPath(); g.moveTo(i+1,y0); g.lineTo(i+1+(r2()-0.5)*4,y0-h); g.stroke(); }
}
function makeBrick(grass){
  const c=makeCanvas(TILE,TILE+OVER); const g=c.getContext('2d'); const y0=OVER;
  g.fillStyle='#5a5660'; g.fillRect(0,y0,TILE,TILE);           // mortar
  const bh=11, bw=TILE/2;
  for(let ry=0,rowi=0; ry<TILE; ry+=bh,rowi++){
    const off=(rowi%2)? -bw/2 : 0;
    for(let bx=off; bx<TILE; bx+=bw){
      const x=bx+1.5, y=y0+ry+1.5, w=bw-3, h=bh-3;
      const fg=g.createLinearGradient(0,y,0,y+h);
      fg.addColorStop(0,'#9aa0ad'); fg.addColorStop(1,'#6b6f7c');     // cool stone
      g.fillStyle=fg; rr(g,x,y,w,h,2); g.fill();
      g.fillStyle='rgba(255,255,255,.32)'; g.fillRect(x+1,y+1,w-2,2);  // top highlight
      g.fillStyle='rgba(25,22,30,.45)'; g.fillRect(x+1,y+h-2,w-2,1); g.fillRect(x+w-2,y+1,1,h-2); // shade
    }
  }
  if(grass) grassCap(g,y0);
  return c;
}
const tBrick=makeBrick(false), tBrickGrass=makeBrick(true);

function makeCloudTile(){
  const c=makeCanvas(TILE,TILE+OVER); const g=c.getContext('2d'); const y0=OVER;
  // volumetric puffs
  for(let i=0;i<5;i++){ puff(g, 8+i*8, y0+10+(i%2?3:0), 16, 0.98); }
  const bg=g.createLinearGradient(0,y0+8,0,y0+TILE); bg.addColorStop(0,'#ffffff'); bg.addColorStop(1,'#cfd9ee');
  g.fillStyle=bg; rr(g,0,y0+10,TILE,TILE-10,10); g.fill();
  g.fillStyle='rgba(160,180,215,.5)'; g.fillRect(0,y0+TILE-6,TILE,6);
  g.fillStyle='rgba(255,255,255,.9)'; for(let i=0;i<TILE;i+=12){ g.beginPath(); g.arc(i+7,y0+10,8,0,7); g.fill(); }
  return c;
}
const tCloud=makeCloudTile();

//==================================================================
// LEVEL — hand-designed, paced layout
//==================================================================
let level, COLS, ROWS, coins, enemies, particles, player, camX, camY;
let score, lives, timeLeft, gameState, goalX;

const SOLID = new Set(['#','X','B','=']);

function buildLevel(){
  ROWS = 13;
  COLS = 172;
  const grid = Array.from({length:ROWS},()=>new Array(COLS).fill('.'));
  const gnd = ROWS-2; // 11
  const set=(r,c,ch)=>{ if(r>=0&&r<ROWS&&c>=0&&c<COLS) grid[r][c]=ch; };

  for(let c=0;c<COLS;c++){ set(gnd,c,'#'); set(gnd+1,c,'X'); }
  const gaps=[[24,26],[44,47],[64,66],[84,88],[104,106],[124,127],[146,148]];
  for(const [a,b] of gaps) for(let c=a;c<=b;c++){ set(gnd,c,'.'); set(gnd+1,c,'.'); }

  const plats=[
    [30,8,3,'B'],[38,5,2,'B'],[50,7,3,'B'],[68,6,3,'B'],
    [85,8,2,'B'],[92,6,3,'B'],[108,7,3,'B'],[118,4,2,'B'],
    [131,8,4,'B'],[140,6,2,'B'],[152,9,3,'B'],
  ];
  for(const [c,r,w,t] of plats) for(let i=0;i<w;i++) set(r,c+i,t);

  set(gnd-1,160,'B'); set(gnd-1,161,'B'); set(gnd-2,162,'B'); set(gnd-2,163,'B'); set(gnd-3,164,'B');

  const coinRow=(c,r,n)=>{ for(let i=0;i<n;i++) set(r,c+i,'c'); };
  const coinArc=(c,r)=>{ set(r,c,'c'); set(r-1,c+1,'c'); set(r-1,c+2,'c'); set(r,c+3,'c'); };
  coinRow(30,7,3); coinRow(38,4,2); coinRow(50,6,3); coinRow(68,5,3);
  coinRow(92,5,3); coinRow(108,6,3); coinRow(118,3,2); coinRow(131,7,4); coinRow(140,5,2);
  coinArc(23,9); coinArc(43,9); coinArc(63,9); coinArc(103,9); coinArc(123,9); coinArc(145,9);

  const snails=[16,34,56,74,98,114,134];
  for(const c of snails) set(gnd-1,c,'s');
  set(6,69,'s'); set(7,52,'s');

  set(gnd-1,2,'P');
  const gx=COLS-6;
  set(gnd-1,gx,'F');

  level = grid;
  coins=[]; enemies=[]; particles=[];
  for(let r=0;r<ROWS;r++)for(let col=0;col<COLS;col++){
    const ch=grid[r][col];
    const x=col*TILE, y=r*TILE;
    if(ch==='c'){ coins.push({x:x+TILE/2,y:y+TILE/2,got:false,t:Math.random()*6}); grid[r][col]='.'; }
    else if(ch==='s'){ enemies.push({x:x+2,y:y+TILE-SNAIL_H,w:SNAIL_W-10,h:SNAIL_H-2,vx:-50,dead:0,squashT:0}); grid[r][col]='.'; }
    else if(ch==='P'){ player={ x:x+8, y:y, w:24, h:HERO_H-6, vx:0, vy:0, onGround:false, face:1, runT:0, coyote:0, jbuf:0, invuln:0 }; grid[r][col]='.'; }
    else if(ch==='F'){ goalX=x+TILE/2; }
  }
  camX=0; camY=0;
  score=0; lives=3; timeLeft=300; gameState='play';
}

function solidAt(col,row){
  if(col<0) return true;
  if(col>=COLS) return true;
  if(row<0) return false;
  if(row>=ROWS) return false;
  return SOLID.has(level[row][col]);
}
// visual neighbour test (out-of-range = empty, so world edges get nice grass/edges)
function solidVis(col,row){
  if(col<0||col>=COLS||row<0||row>=ROWS) return false;
  return SOLID.has(level[row][col]);
}

//==================================================================
// PHYSICS / COLLISION
//==================================================================
function collideX(e){
  const top=Math.floor(e.y/TILE), bot=Math.floor((e.y+e.h-1)/TILE);
  if(e.vx>0){
    const col=Math.floor((e.x+e.w)/TILE);
    for(let r=top;r<=bot;r++) if(solidAt(col,r)){ e.x=col*TILE-e.w-0.01; e.vx=0; return true; }
  } else if(e.vx<0){
    const col=Math.floor(e.x/TILE);
    for(let r=top;r<=bot;r++) if(solidAt(col,r)){ e.x=(col+1)*TILE+0.01; e.vx=0; return true; }
  }
  return false;
}
function collideY(e){
  const left=Math.floor(e.x/TILE), right=Math.floor((e.x+e.w-1)/TILE);
  e.onGround=false;
  if(e.vy>0){
    const row=Math.floor((e.y+e.h)/TILE);
    for(let cl=left;cl<=right;cl++) if(solidAt(cl,row)){ e.y=row*TILE-e.h-0.01; e.vy=0; e.onGround=true; return; }
  } else if(e.vy<0){
    const row=Math.floor(e.y/TILE);
    for(let cl=left;cl<=right;cl++) if(solidAt(cl,row)){ e.y=(row+1)*TILE+0.01; e.vy=0; return; }
  }
}

//==================================================================
// UPDATE
//==================================================================
function update(dt){
  if(gameState!=='play') return;
  timeLeft -= dt;
  if(timeLeft<=0){ timeLeft=0; loseLife(true); return; }

  const p=player;
  const dir = (keys.right?1:0) - (keys.left?1:0);
  const a = p.onGround?ACCEL:AIR_ACCEL;
  if(dir!==0){ p.vx += dir*a*dt; p.face=dir; }
  else { const f=FRICTION*dt; if(Math.abs(p.vx)<=f) p.vx=0; else p.vx-=Math.sign(p.vx)*f; }
  p.vx=Math.max(-MOVE,Math.min(MOVE,p.vx));

  p.coyote = p.onGround? COYOTE : Math.max(0,p.coyote-dt);
  if(keys.jumpPressed){ p.jbuf=JUMP_BUFFER; keys.jumpPressed=false; }
  else p.jbuf=Math.max(0,p.jbuf-dt);
  if(p.jbuf>0 && p.coyote>0){ p.vy=-JUMP_V; p.coyote=0; p.jbuf=0; sfx.jump(); spawnDust(p.x+p.w/2,p.y+p.h); }
  if(!keys.jump && p.vy<0) p.vy *= 0.86;

  p.vy += GRAV*dt; if(p.vy>MAX_FALL)p.vy=MAX_FALL;

  p.x += p.vx*dt; collideX(p);
  p.y += p.vy*dt; collideY(p);

  p.runT += Math.abs(p.vx)*dt*0.06;
  if(p.invuln>0) p.invuln-=dt;

  if(p.y>ROWS*TILE+200){ loseLife(false); return; }
  if(p.x+p.w/2 > goalX-12){ win(); return; }

  for(const co of coins){ if(co.got) continue; co.t+=dt*6;
    if(Math.abs((p.x+p.w/2)-co.x)<26 && Math.abs((p.y+p.h/2)-co.y)<30){
      co.got=true; score+=100; sfx.coin(); spawnSpark(co.x,co.y);
    }
  }

  for(const en of enemies){
    if(en.dead){ en.squashT-=dt; continue; }
    en.x+=en.vx*dt;
    const aheadCol=Math.floor((en.vx>0? en.x+en.w+2 : en.x-2)/TILE);
    const footRow=Math.floor((en.y+en.h+4)/TILE);
    const headRow=Math.floor((en.y+en.h/2)/TILE);
    if(solidAt(aheadCol,headRow) || !solidAt(aheadCol,footRow)){ en.vx*=-1; }
    en.y+=120*dt;
    const er=Math.floor((en.y+en.h)/TILE);
    const elc=Math.floor(en.x/TILE), erc=Math.floor((en.x+en.w-1)/TILE);
    if(solidAt(elc,er)||solidAt(erc,er)){ en.y=er*TILE-en.h-0.01; }

    if(p.invuln<=0 && p.x<en.x+en.w && p.x+p.w>en.x && p.y<en.y+en.h && p.y+p.h>en.y){
      if(p.vy>120 && (p.y+p.h) < en.y+en.h*0.6){
        en.dead=1; en.squashT=0.4; p.vy=-JUMP_V*0.62; score+=200; sfx.stomp(); spawnSpark(en.x+en.w/2,en.y);
      } else { loseLife(false); return; }
    }
  }

  for(const pt of particles){ pt.x+=pt.vx*dt; pt.y+=pt.vy*dt; pt.vy+=900*dt; pt.life-=dt; }
  particles=particles.filter(pt=>pt.life>0);

  const targetX = p.x+p.w/2 - VIEW_W*0.4;
  camX += (targetX-camX)*Math.min(1,dt*8);
  camX=Math.max(0,Math.min(camX, COLS*TILE-VIEW_W));
  const targetY = p.y+p.h/2 - VIEW_H*0.6;
  camY += (targetY-camY)*Math.min(1,dt*6);
  camY=Math.max(-60,Math.min(camY, ROWS*TILE-VIEW_H+TILE));
}

function spawnSpark(x,y){ for(let i=0;i<10;i++){const a=Math.random()*7;particles.push({x,y,vx:Math.cos(a)*140,vy:Math.sin(a)*140-60,life:0.55,col:'#ffe066',r:3,glow:1});} }
function spawnDust(x,y){ for(let i=0;i<7;i++){particles.push({x,y,vx:(Math.random()-0.5)*120,vy:-Math.random()*60,life:0.35,col:'#e8e2d0',r:3,glow:0});} }

function loseLife(timeout){
  lives--; sfx.hurt();
  if(lives<=0){ gameOver(); return; }
  player.x=Math.max(camX+40,2*TILE); player.y=(ROWS-3)*TILE; player.vx=0; player.vy=0; player.invuln=1.5;
  if(timeout) timeLeft=300;
}
function win(){ gameState='won'; stopMusic(); sfx.win(); showEnd(true); }
function gameOver(){ gameState='lost'; stopMusic(); showEnd(false); }

//==================================================================
// POST-PROCESS BUFFERS (bloom + grain)
//==================================================================
let bloomC=null, bloomG=null, grainC=null;
function sizePostBuffers(){
  const bw=Math.max(2,Math.round(VIEW_W/4)), bh=Math.max(2,Math.round(VIEW_H/4));
  bloomC=makeCanvas(bw,bh); bloomG=bloomC.getContext('2d');
}
(function makeGrain(){
  const S=128; grainC=makeCanvas(S,S); const g=grainC.getContext('2d');
  const id=g.createImageData(S,S);
  for(let i=0;i<id.data.length;i+=4){ const v=200+Math.random()*55; id.data[i]=id.data[i+1]=id.data[i+2]=v; id.data[i+3]=Math.random()*26; }
  g.putImageData(id,0,0);
})();

//==================================================================
// RENDER
//==================================================================
function render(){
  const now=performance.now();
  // sky
  ctx.fillStyle=skyGrad; ctx.fillRect(0,0,VIEW_W,VIEW_H);
  drawMoon();
  drawGodRays(now);
  // sun
  ctx.save(); ctx.globalCompositeOperation='lighter';
  const sunX=VIEW_W*0.72, sunY=VIEW_H*0.22, sunR=300;
  ctx.translate(sunX,sunY); ctx.rotate(now*0.00003);
  ctx.drawImage(sunSprite,-sunR,-sunR,sunR*2,sunR*2);
  ctx.restore();

  // layered depth: far→near ridges, drifting clouds, mythic landmarks, islands, birds
  drawLayer(bgRidgeFar,0.07,camX);
  drawLayer(bgRidgeMid,0.12,camX);
  drawLayer(bgRidgeNear,0.20,camX);
  drawLayer(bgCloudsBack,0.28,camX + now*0.004);
  drawLandmarks(now);
  drawBirds(now);
  drawLayer(bgIslands,0.46,camX);
  drawLayer(bgCloudsFront,0.60,camX + now*0.011);

  // ambient motes
  ctx.save(); ctx.globalCompositeOperation='lighter';
  for(const m of motes){
    const mx=((m.x*VIEW_W) - camX*0.05*m.s) % VIEW_W; const x=mx<0?mx+VIEW_W:mx;
    const y=m.y*VIEW_H + Math.sin(now*0.0005*m.s+m.ph)*14;
    ctx.fillStyle='rgba(255,250,225,'+(0.25*m.s)+')';
    ctx.beginPath(); ctx.arc(x,y,m.r,0,7); ctx.fill();
  }
  ctx.restore();

  // ---- world ----
  ctx.save();
  ctx.translate(-Math.round(camX),-Math.round(camY));

  const c0=Math.max(0,Math.floor(camX/TILE)-1);
  const c1=Math.min(COLS-1,Math.floor((camX+VIEW_W)/TILE)+1);
  const r0=Math.max(0,Math.floor(camY/TILE)-1);
  const r1=Math.min(ROWS-1,Math.floor((camY+VIEW_H)/TILE)+1);
  for(let r=r0;r<=r1;r++)for(let col=c0;col<=c1;col++){
    const ch=level[r][col]; if(ch==='.') continue;
    const x=col*TILE,y=r*TILE;
    if(ch==='#'||ch==='X'){
      const mask=(solidVis(col,r-1)?0:1)|(solidVis(col-1,r)?0:2)|(solidVis(col+1,r)?0:4);
      ctx.drawImage(earthTiles[mask], x, y-OVER);
    } else if(ch==='B'||ch==='='){
      const up=!solidVis(col,r-1),dn=!solidVis(col,r+1),lf=!solidVis(col-1,r),rt=!solidVis(col+1,r);
      if(dn){ const sh=ctx.createLinearGradient(0,y+TILE,0,y+TILE+14); sh.addColorStop(0,'rgba(0,0,0,.28)'); sh.addColorStop(1,'rgba(0,0,0,0)'); ctx.fillStyle=sh; ctx.fillRect(x+3,y+TILE,TILE-6,14); }
      ctx.drawImage(up?tBrickGrass:tBrick, x, y-OVER);
      ctx.lineWidth=2; ctx.strokeStyle='rgba(28,26,34,.8)'; ctx.beginPath();
      if(dn){ctx.moveTo(x,y+TILE-1);ctx.lineTo(x+TILE,y+TILE-1);}
      if(lf){ctx.moveTo(x+1,y);ctx.lineTo(x+1,y+TILE);}
      if(rt){ctx.moveTo(x+TILE-1,y);ctx.lineTo(x+TILE-1,y+TILE);}
      ctx.stroke();
    }
  }

  drawFlag(goalX, now);
  for(const co of coins){ if(co.got) continue; drawCoin(co); }

  // enemies (+ contact shadow)
  for(const en of enemies){
    if(en.dead){
      ctx.save(); ctx.globalAlpha=Math.max(0,en.squashT/0.4);
      ctx.drawImage(en.vx<0?snailL:snailR, en.x-5, en.y+en.h-12, SNAIL_W,12);
      ctx.restore(); continue;
    }
    castShadow(en.x+en.w/2, en.y+en.h, en.w*0.8);
    ctx.drawImage(en.vx<0?snailL:snailR, en.x-5, en.y-(SNAIL_H-en.h)+2);
  }

  for(const pt of particles){
    ctx.save();
    if(pt.glow) ctx.globalCompositeOperation='lighter';
    ctx.globalAlpha=Math.max(0,pt.life*2); ctx.fillStyle=pt.col;
    ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r,0,7);ctx.fill();
    ctx.restore();
  }
  ctx.globalAlpha=1;

  drawPlayer();
  ctx.restore();

  // ---- post-processing ----
  postProcess(now);
  drawHUD();
}

function castShadow(cxw, groundY, w){
  // find the surface beneath and draw a soft ellipse, fading with the gap
  const col=Math.floor(cxw/TILE);
  let surf=null;
  for(let r=Math.floor(groundY/TILE); r<ROWS; r++){ if(solidVis(col,r)){ surf=r*TILE; break; } }
  if(surf===null) return;
  const gap=Math.max(0,surf-groundY);
  const a=Math.max(0,0.32-gap/900);
  if(a<=0.01) return;
  const sw=w*(1-Math.min(0.5,gap/600));
  ctx.save(); ctx.fillStyle='rgba(20,30,45,'+a+')';
  ctx.beginPath(); ctx.ellipse(cxw, surf-2, sw*0.6, sw*0.18, 0,0,7); ctx.fill(); ctx.restore();
}

function drawPlayer(){
  const p=player;
  castShadow(p.x+p.w/2, p.y+p.h, p.w*1.3);
  let frame=heroFrames.idle;
  if(!p.onGround) frame=heroFrames.jump;
  else if(Math.abs(p.vx)>30) frame = (Math.floor(p.runT)%2===0)? heroFrames.run1:heroFrames.run2;
  ctx.save();
  if(p.invuln>0 && Math.floor(p.invuln*16)%2===0) ctx.globalAlpha=0.4;
  const drawX=p.x-(HERO_W-p.w)/2, drawY=p.y-(HERO_H-p.h);
  if(p.face<0){ ctx.translate(drawX+HERO_W,drawY); ctx.scale(-1,1); ctx.drawImage(frame,0,0); }
  else ctx.drawImage(frame,drawX,drawY);
  ctx.restore();
}

function drawCoin(co){
  const spin=Math.abs(Math.cos(co.t)); const w=spin*16+3;
  const x=co.x, y=co.y+Math.sin(co.t*0.4)*3;
  // glow
  ctx.save(); ctx.globalCompositeOperation='lighter';
  const gl=ctx.createRadialGradient(x,y,1,x,y,18);
  gl.addColorStop(0,'rgba(255,230,120,.55)'); gl.addColorStop(1,'rgba(255,230,120,0)');
  ctx.fillStyle=gl; ctx.beginPath(); ctx.arc(x,y,18,0,7); ctx.fill(); ctx.restore();
  // body
  const bg=ctx.createLinearGradient(x-w/2,y-12,x+w/2,y+12);
  bg.addColorStop(0,'#b8860b'); bg.addColorStop(0.5,'#ffd84a'); bg.addColorStop(1,'#b8860b');
  ctx.fillStyle=bg; ctx.strokeStyle='#7a5a05'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.ellipse(x,y,w/2+1,12,0,0,7); ctx.fill(); ctx.stroke();
  ctx.fillStyle='rgba(255,240,170,.9)'; ctx.beginPath(); ctx.ellipse(x,y,Math.max(1,w/2-2.5),9,0,0,7); ctx.fill();
  if(w>9){ ctx.fillStyle='rgba(255,255,255,.95)'; ctx.fillRect(x-1.2,y-6,2.2,7); }
}

function drawFlag(gx, now){
  const groundY=(ROWS-2)*TILE;
  const topY=groundY-TILE*4;
  // base block (brick-styled)
  ctx.drawImage(tBrick, gx-TILE/2, groundY-TILE-OVER);
  // pole
  const pg=ctx.createLinearGradient(gx-3,0,gx+3,0); pg.addColorStop(0,'#f2f2f8'); pg.addColorStop(1,'#b8b8c6');
  ctx.fillStyle=pg; ctx.fillRect(gx-3,topY,5,TILE*4);
  // finial gem with glow
  ctx.save(); ctx.globalCompositeOperation='lighter';
  const gg=ctx.createRadialGradient(gx,topY,1,gx,topY,16);
  gg.addColorStop(0,'rgba(120,220,160,.8)'); gg.addColorStop(1,'rgba(120,220,160,0)');
  ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(gx,topY,16,0,7); ctx.fill(); ctx.restore();
  ctx.fillStyle='#7CF2A8'; ctx.beginPath(); ctx.arc(gx,topY,5,0,7); ctx.fill();
  // waving cloth
  const wave=Math.sin(now*0.005)*5;
  const fg=ctx.createLinearGradient(gx,topY+6,gx+46,topY+34);
  fg.addColorStop(0,'#ff5d7a'); fg.addColorStop(1,'#d62f55');
  ctx.fillStyle=fg;
  ctx.beginPath(); ctx.moveTo(gx+2,topY+6);
  ctx.quadraticCurveTo(gx+24,topY+2+wave, gx+46+wave,topY+16);
  ctx.quadraticCurveTo(gx+24,topY+24+wave, gx+2,topY+34);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.85)'; ctx.beginPath(); ctx.arc(gx+22,topY+19,4,0,7); ctx.fill();
}

function postProcess(now){
  // bloom: downsample the frame, draw back additively for soft glow
  if(bloomC){
    bloomG.clearRect(0,0,bloomC.width,bloomC.height);
    bloomG.drawImage(canvas, 0,0, canvas.width,canvas.height, 0,0, bloomC.width,bloomC.height);
    ctx.save();
    ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=0.12; ctx.imageSmoothingEnabled=true;
    ctx.drawImage(bloomC, 0,0, bloomC.width,bloomC.height, 0,0, VIEW_W,VIEW_H);
    ctx.restore();
  }
  // warm colour grade
  ctx.save(); ctx.globalCompositeOperation='soft-light'; ctx.globalAlpha=0.22;
  const grade=ctx.createLinearGradient(0,0,0,VIEW_H);
  grade.addColorStop(0,'#ffd27a'); grade.addColorStop(1,'#3a4f8a');
  ctx.fillStyle=grade; ctx.fillRect(0,0,VIEW_W,VIEW_H); ctx.restore();
  // film grain
  ctx.save(); ctx.globalAlpha=0.05;
  const gx=-(now*0.05%128), gy=-(now*0.03%128);
  for(let x=gx;x<VIEW_W;x+=128) for(let y=gy;y<VIEW_H;y+=128) ctx.drawImage(grainC,x,y);
  ctx.restore();
}

//------------------------------------------------------------------
// HUD
//------------------------------------------------------------------
function hudText(txt,x,y,size){
  ctx.font='900 '+size+'px "Trebuchet MS", sans-serif';
  ctx.textBaseline='middle';
  ctx.lineWidth=4; ctx.strokeStyle='rgba(20,12,40,.9)';
  ctx.strokeText(txt,x,y);
  ctx.fillStyle='#fff'; ctx.fillText(txt,x,y);
}
function drawHUD(){
  const y=30;
  hudText('SCORE '+String(score).padStart(6,'0'), 24, y, 26);
  ctx.fillStyle='#ffd84a';ctx.strokeStyle='#7a5a05';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(VIEW_W*0.42,y,9,0,7);ctx.fill();ctx.stroke();
  hudText('x'+String(coinsCollected()).padStart(2,'0'), VIEW_W*0.42+16, y, 24);
  hudText('TIME '+String(Math.ceil(timeLeft)).padStart(3,'0'), VIEW_W*0.56, y, 26);
  hudText('LIFE', VIEW_W-220, y, 24);
  for(let i=0;i<Math.max(0,lives);i++){
    ctx.drawImage(heroFrames.idle, VIEW_W-150+i*38, y-22, HERO_W*0.72, HERO_H*0.72);
  }
}
function coinsCollected(){ let n=0; for(const c of coins) if(c.got)n++; return n; }

//==================================================================
// GAME LOOP (fixed timestep)
//==================================================================
let last=0, acc=0; const STEP=1/120;
function frame(t){
  if(!last)last=t; let dt=(t-last)/1000; last=t;
  if(dt>0.1)dt=0.1;
  if(gameState==='play'){ acc+=dt; while(acc>=STEP){ update(STEP); acc-=STEP; } }
  try { render(); } catch(e) { console.error('render error', e); }
  requestAnimationFrame(frame);
}

resize();          // sets up sky + post buffers
buildLevel();
gameState='title';
requestAnimationFrame(frame);

//==================================================================
// SCREENS / FLOW
//==================================================================
const startScreen=document.getElementById('startScreen');
const endScreen=document.getElementById('endScreen');
let paused=false;
function startGame(){
  initAudio(); if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
  buildLevel();
  startScreen.classList.add('hidden'); endScreen.classList.add('hidden');
  paused=false; last=0; startMusic();
}
function showEnd(won){
  document.getElementById('endTitle').textContent = won? 'YOU WIN!' : 'GAME OVER';
  document.getElementById('endTitle').style.background = won
    ? 'linear-gradient(180deg,#bdfccb,#52d98a)' : 'linear-gradient(180deg,#ffc3c3,#ff5d6c)';
  document.getElementById('endTitle').style.webkitBackgroundClip='text';
  document.getElementById('endTitle').style.backgroundClip='text';
  document.getElementById('endTitle').style.color='transparent';
  document.getElementById('againBtn').textContent='↻ PLAY AGAIN';
  document.getElementById('endSub').textContent =
    'Final score: '+score+'   ·   Coins: '+coinsCollected();
  endScreen.classList.remove('hidden');
}
function togglePause(){
  if(gameState==='play'){ paused=true; gameState='paused'; stopMusic(); showPauseOverlay(); return; }
  if(gameState==='paused'){ resumeGame(); }
}
function resumeGame(){
  gameState='play'; paused=false; endScreen.classList.add('hidden');
  document.getElementById('againBtn').textContent='↻ PLAY AGAIN';
  startMusic(); last=0;
}
function showPauseOverlay(){
  document.getElementById('endTitle').textContent='PAUSED';
  document.getElementById('endTitle').style.color='#fff';
  document.getElementById('endTitle').style.background='none';
  document.getElementById('endSub').textContent='Tap ▶ to resume';
  document.getElementById('againBtn').textContent='▶ RESUME';
  endScreen.classList.remove('hidden');
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('againBtn').addEventListener('click', ()=>{
  if(gameState==='paused'){ resumeGame(); return; }
  startGame();
});
document.getElementById('btnPause').addEventListener('click', togglePause);

['touchstart','mousedown','keydown'].forEach(ev=>addEventListener(ev,function once(){
  initAudio(); if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
},{once:true}));
</script>
